<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>いぬねこアルバム 🐾</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --orange: #F5A623;
      --orange2: #FF8C42;
      --cream: #FFF8EE;
      --pale: #FFF3DC;
      --text: #3D2B1F;
      --muted: #C4A882;
      --border: rgba(245,166,35,0.2);
      --white: #FFFFFF;
    }

    body {
      font-family: 'Nunito', 'Hiragino Maru Gothic ProN', 'ヒラギノ丸ゴ ProN W4', Meiryo, sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 36px 16px 56px;
    }

    /* ─── Header ─── */
    .header { text-align: center; margin-bottom: 24px; }

    .title-wrap {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: white;
      border-radius: 50px;
      padding: 10px 24px;
      box-shadow: 0 4px 20px rgba(245,166,35,0.18);
      margin-bottom: 6px;
    }

    .title-jp {
      font-size: 1.4rem;
      font-weight: 900;
      color: var(--text);
      letter-spacing: 0.04em;
    }

    .title-en {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--orange);
      letter-spacing: 0.08em;
    }

    .paw {
      font-size: 1.3rem;
      display: inline-block;
      animation: wobble 2s ease-in-out infinite;
    }

    @keyframes wobble {
      0%, 100% { transform: rotate(-8deg); }
      50% { transform: rotate(8deg); }
    }

    /* ─── Toggle ─── */
    .toggle-wrap {
      display: flex;
      background: white;
      border-radius: 50px;
      padding: 5px;
      margin-bottom: 20px;
      gap: 4px;
      box-shadow: 0 3px 14px rgba(245,166,35,0.15);
    }

    .toggle-btn {
      padding: 9px 28px;
      border: none; border-radius: 50px;
      font-size: 0.92rem; cursor: pointer;
      font-family: inherit; font-weight: 900;
      transition: all 0.25s ease;
      background: transparent;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .toggle-btn.active {
      background: linear-gradient(135deg, var(--orange), var(--orange2));
      color: white;
      box-shadow: 0 4px 14px rgba(245,166,35,0.4);
    }

    /* ─── Search ─── */
    .search-wrap {
      position: relative;
      max-width: 440px; width: 100%;
      margin-bottom: 22px;
    }

    .search-input {
      width: 100%;
      padding: 14px 48px 14px 22px;
      background: white;
      border: 2px solid var(--border);
      border-radius: 50px;
      color: var(--text);
      font-size: 0.92rem;
      font-family: inherit;
      font-weight: 700;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-shadow: 0 3px 14px rgba(245,166,35,0.1);
    }

    .search-input:focus {
      border-color: var(--orange);
      box-shadow: 0 0 0 4px rgba(245,166,35,0.12);
    }

    .search-input::placeholder { color: var(--muted); font-weight: 400; }

    .search-icon {
      position: absolute; right: 18px; top: 50%;
      transform: translateY(-50%);
      font-size: 1rem; pointer-events: none;
    }

    /* ─── Dropdown ─── */
    .dropdown {
      position: absolute; top: calc(100% + 8px);
      left: 0; right: 0;
      background: white;
      border: 2px solid var(--border);
      border-radius: 20px;
      overflow: hidden; z-index: 50;
      box-shadow: 0 12px 40px rgba(245,166,35,0.2);
      max-height: 280px; overflow-y: auto;
    }

    .dropdown::-webkit-scrollbar { width: 4px; }
    .dropdown::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .dd-item {
      padding: 12px 20px;
      cursor: pointer;
      transition: background 0.12s;
      font-size: 0.9rem; font-weight: 700;
      display: flex; align-items: center; gap: 10px;
      color: var(--muted);
      border-bottom: 1px solid var(--pale);
    }

    .dd-item:hover, .dd-item.focused { background: var(--pale); color: var(--text); }
    .dd-item .hl { color: var(--orange2); font-weight: 900; }

    /* ─── Card ─── */
    .card {
      max-width: 440px; width: 100%;
      border-radius: 28px; overflow: hidden;
      background: white;
      box-shadow: 0 12px 48px rgba(245,166,35,0.18);
      animation: popIn 0.4s cubic-bezier(.22,.68,0,1.3);
    }

    @keyframes popIn {
      from { opacity: 0; transform: translateY(16px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ─── Photo ─── */
    .photo-area {
      position: relative; width: 100%; height: 360px;
      overflow: hidden; background: var(--pale);
    }

    .breed-img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.7s ease;
    }

    .card:hover .breed-img { transform: scale(1.04); }

    .img-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 7rem;
      background: linear-gradient(160deg, #FFF3DC, #FFE8C0);
    }

    /* Gradient overlay */
    .gradient-bottom {
      position: absolute; bottom: 0; left: 0; right: 0; height: 60%;
      background: linear-gradient(to top, rgba(30,15,5,0.75) 0%, transparent 100%);
      pointer-events: none;
    }

    /* Decorative corner stamps */
    .corner { position: absolute; font-size: 1.2rem; opacity: 0.7; }
    .corner.tl { top: 12px; left: 14px; }
    .corner.tr { top: 12px; right: 14px; }

    /* Fav button */
    .fav-btn {
      position: absolute; bottom: 16px; right: 16px;
      width: 46px; height: 46px; border-radius: 50%;
      border: none;
      background: white;
      font-size: 1.3rem; cursor: pointer;
      transition: transform 0.18s, box-shadow 0.2s;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      z-index: 3;
    }

    .fav-btn:hover { transform: scale(1.15); box-shadow: 0 6px 20px rgba(0,0,0,0.2); }
    .fav-btn:active { transform: scale(0.9); }

    /* Breed name overlay */
    .name-overlay {
      position: absolute; bottom: 20px; left: 20px; z-index: 2;
    }

    .breed-name {
      font-size: 1.9rem; font-weight: 900;
      color: white; line-height: 1.1;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .breed-sub {
      font-size: 0.78rem; color: rgba(255,255,255,0.8);
      margin-top: 4px; font-weight: 700;
      letter-spacing: 0.05em;
    }

    /* Tags in photo */
    .tags-overlay {
      position: absolute; top: 52px; left: 16px; z-index: 2;
      display: flex; flex-wrap: wrap; gap: 5px;
    }

    .tag-pill {
      padding: 3px 10px; border-radius: 20px;
      font-size: 0.7rem; font-weight: 800;
      background: rgba(255,255,255,0.22);
      backdrop-filter: blur(4px);
      color: white;
      border: 1px solid rgba(255,255,255,0.35);
      letter-spacing: 0.04em;
    }

    /* ─── Info section ─── */
    .info { padding: 20px 20px 6px; }

    .starters-label {
      font-size: 0.7rem; font-weight: 900; color: var(--muted);
      letter-spacing: 0.16em; text-transform: uppercase; margin-bottom: 12px;
    }

    .starters { display: flex; flex-direction: column; gap: 9px; }

    .starter {
      padding: 12px 16px; border-radius: 16px;
      background: var(--pale);
      font-size: 0.88rem; line-height: 1.65;
      color: var(--text); font-weight: 700;
      border-left: 3px solid var(--orange);
      opacity: 0; transform: translateY(6px);
      animation: riseIn 0.35s ease forwards;
    }

    .starter:nth-child(1) { animation-delay: 0.06s; }
    .starter:nth-child(2) { animation-delay: 0.15s; }
    .starter:nth-child(3) { animation-delay: 0.24s; }
    .starter:nth-child(4) { animation-delay: 0.33s; }

    @keyframes riseIn { to { opacity: 1; transform: translateY(0); } }

    /* ─── Bottom ─── */
    .card-bottom { padding: 14px 20px 20px; }

    .btn-random {
      width: 100%; padding: 14px;
      border: 2px solid var(--border);
      border-radius: 50px;
      font-size: 0.9rem; font-weight: 900;
      cursor: pointer; font-family: inherit;
      background: white; color: var(--muted);
      transition: all 0.2s; letter-spacing: 0.04em;
    }

    .btn-random:hover {
      border-color: var(--orange);
      color: var(--orange2);
      background: var(--pale);
    }

    /* ─── Empty state ─── */
    .empty-state {
      max-width: 440px; width: 100%;
      padding: 64px 24px; text-align: center;
      color: var(--muted); background: white;
      border-radius: 28px;
      box-shadow: 0 8px 32px rgba(245,166,35,0.1);
    }

    .empty-state .em { font-size: 3.5rem; margin-bottom: 14px; display: block; }
    .empty-state p { font-size: 0.9rem; line-height: 1.8; font-weight: 700; }

    .spin { animation: spin 1.1s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Fav counter ─── */
    .fav-counter {
      margin-top: 20px; font-size: 0.8rem; color: var(--muted);
      cursor: pointer; transition: color 0.2s;
      font-weight: 700; letter-spacing: 0.06em;
    }
    .fav-counter:hover { color: var(--orange2); }

    /* ─── Modal ─── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(60,30,10,0.45);
      backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; padding: 24px;
    }

    .modal {
      background: white;
      border-radius: 26px; max-width: 440px; width: 100%;
      max-height: 82vh; overflow-y: auto; padding: 26px;
      box-shadow: 0 32px 80px rgba(245,166,35,0.2);
    }

    .modal-head {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 18px;
    }

    .modal-title { font-size: 1.2rem; font-weight: 900; color: var(--text); }

    .modal-close {
      border: 2px solid var(--border); background: var(--pale);
      width: 34px; height: 34px; border-radius: 50%;
      cursor: pointer; font-size: 0.85rem; color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; transition: background 0.2s;
    }
    .modal-close:hover { background: var(--border); color: var(--orange2); }

    .fav-item {
      display: flex; gap: 14px; align-items: center;
      padding: 12px 0; border-bottom: 1px solid var(--pale);
    }

    .fav-thumb {
      width: 58px; height: 58px; border-radius: 14px;
      object-fit: cover; flex-shrink: 0; background: var(--pale);
    }

    .fav-thumb-ph {
      width: 58px; height: 58px; border-radius: 14px;
      background: var(--pale);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; flex-shrink: 0;
    }

    .fav-name { font-weight: 900; font-size: 0.93rem; color: var(--text); }
    .fav-meta { font-size: 0.74rem; color: var(--muted); margin-top: 2px; font-weight: 700; }

    .fav-rm {
      margin-left: auto; border: none; background: none;
      cursor: pointer; font-size: 0.9rem; color: var(--muted);
      transition: color 0.2s; flex-shrink: 0;
    }
    .fav-rm:hover { color: var(--orange2); }

    .empty-fav {
      text-align: center; padding: 40px 0;
      color: var(--muted); font-size: 0.9rem; line-height: 1.9; font-weight: 700;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="header">
  <div class="title-wrap">
    <span class="title-jp">いぬねこ</span>
    <span class="paw">🐾</span>
    <span class="title-jp">アルバム</span>
  </div>
  <div class="title-en">OurPets</div>
</div>

<div class="toggle-wrap">
  <button class="toggle-btn" id="btn-dog" onclick="setType('dog')">🐶 いぬ</button>
  <button class="toggle-btn" id="btn-cat" onclick="setType('cat')">🐱 ねこ</button>
</div>

<div class="search-wrap" id="search-wrap">
  <input
    class="search-input" id="search-input"
    type="text" autocomplete="off"
    placeholder="なまえで検索… (例: Shiba, Persian)"
    oninput="onInput()" onkeydown="onKeyDown(event)" onfocus="showDrop()"
  >
  <span class="search-icon">🔍</span>
  <div class="dropdown hidden" id="dropdown"></div>
</div>

<div id="main"></div>

<div class="fav-counter" onclick="openFav()">♡ お気に入り <span id="fav-count">0</span> 頭</div>

<div class="overlay hidden" id="overlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title">💕 お気に入り</span>
      <button class="modal-close" onclick="closeFav()">✕</button>
    </div>
    <div id="fav-list"></div>
  </div>
</div>

<script>
  const S = {
    type: 'dog',
    dogBreeds: [], catBreeds: [],
    breed: null, image: null,
    favorites: JSON.parse(localStorage.getItem('fwmt') || '[]'),
    focusIdx: -1,
  };

  async function init() {
    updateToggle();
    renderEmpty('よみこみちゅう…', true);
    const [dogs, cats] = await Promise.all([
      fetch('https://api.thedogapi.com/v1/breeds').then(r => r.json()).catch(() => []),
      fetch('https://api.thecatapi.com/v1/breeds').then(r => r.json()).catch(() => []),
    ]);
    S.dogBreeds = Array.isArray(dogs) ? dogs : [];
    S.catBreeds = Array.isArray(cats) ? cats : [];
    updateFavCount();
    renderEmpty('なまえを入力して検索してね 🐾');
  }

  function setType(t) {
    S.type = t; S.breed = null; S.image = null;
    updateToggle(); clearSearch();
    renderEmpty('なまえを入力して検索してね 🐾');
  }

  function updateToggle() {
    document.getElementById('btn-dog').className = 'toggle-btn' + (S.type === 'dog' ? ' active' : '');
    document.getElementById('btn-cat').className = 'toggle-btn' + (S.type === 'cat' ? ' active' : '');
  }

  function breeds() { return S.type === 'dog' ? S.dogBreeds : S.catBreeds; }

  function onInput() {
    S.focusIdx = -1;
    const q = document.getElementById('search-input').value.trim().toLowerCase();
    if (!q) { hideDrop(); return; }
    const matches = breeds().filter(b => b.name.toLowerCase().includes(q)).slice(0, 10);
    renderDrop(matches, q);
  }

  function renderDrop(list, q) {
    const dd = document.getElementById('dropdown');
    if (!list.length) { hideDrop(); return; }
    const icon = S.type === 'dog' ? '🐶' : '🐱';
    dd.innerHTML = list.map(b => {
      const n = b.name;
      const i = n.toLowerCase().indexOf(q);
      const html = n.slice(0, i) + `<span class="hl">${n.slice(i, i + q.length)}</span>` + n.slice(i + q.length);
      return `<div class="dd-item" onclick="selectBreed(${breeds().indexOf(b)})">${icon} ${html}</div>`;
    }).join('');
    dd.classList.remove('hidden');
  }

  function showDrop() { if (document.getElementById('search-input').value.trim()) onInput(); }
  function hideDrop() { document.getElementById('dropdown').classList.add('hidden'); S.focusIdx = -1; }

  function onKeyDown(e) {
    const items = document.querySelectorAll('.dd-item');
    if (e.key === 'ArrowDown') { e.preventDefault(); S.focusIdx = Math.min(S.focusIdx + 1, items.length - 1); updFocus(items); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); S.focusIdx = Math.max(S.focusIdx - 1, -1); updFocus(items); }
    else if (e.key === 'Enter' && S.focusIdx >= 0) items[S.focusIdx]?.click();
    else if (e.key === 'Escape') hideDrop();
  }

  function updFocus(items) { items.forEach((el, i) => el.classList.toggle('focused', i === S.focusIdx)); }
  function clearSearch() { document.getElementById('search-input').value = ''; hideDrop(); }

  document.addEventListener('click', e => {
    if (!document.getElementById('search-wrap').contains(e.target)) hideDrop();
  });

  async function selectBreed(idx) {
    const breed = breeds()[idx];
    if (!breed) return;
    S.breed = breed; hideDrop();
    document.getElementById('search-input').value = breed.name;
    renderEmpty('よみこみちゅう…', true);

    const base = S.type === 'dog'
      ? 'https://api.thedogapi.com/v1/images/search'
      : 'https://api.thecatapi.com/v1/images/search';

    try {
      const res = await fetch(`${base}?breed_ids=${breed.id}&limit=8`);
      const data = await res.json();
      const imgs = data.filter(d => d.url);
      S.image = imgs.length ? imgs[Math.floor(Math.random() * imgs.length)].url : null;
    } catch { S.image = null; }

    render();
  }

  async function randomBreed() {
    const list = breeds();
    if (!list.length) return;
    clearSearch();
    await selectBreed(Math.floor(Math.random() * list.length));
  }

  function makeStarters(breed, type) {
    const pool = [];
    if (breed.temperament) {
      const pick = breed.temperament.split(',').map(s => s.trim()).filter(Boolean)
        .sort(() => Math.random() - 0.5).slice(0, 3);
      pool.push(`💬 「${pick.join(' · ')}」な性格らしいよ！あなたのイメージと合ってる？`);
    }
    if (breed.origin) pool.push(`🌍 ${breed.name}は${breed.origin}出身なんだって！意外じゃない？`);
    if (breed.life_span) pool.push(`⏳ 平均寿命は${breed.life_span}。長い付き合いになりそうだよね！`);
    if (type === 'dog') {
      if (breed.bred_for) pool.push(`🎯 もともと「${breed.bred_for}」のために育てられたって知ってた？`);
      if (breed.breed_group) pool.push(`🏷 ${breed.breed_group}グループのワンちゃん。犬の世界にも派閥があるんだよ！`);
      if (breed.weight?.metric) pool.push(`⚖️ 大人になると${breed.weight.metric}kgになるんだって！`);
    }
    if (type === 'cat') {
      if (breed.description) {
        const first = breed.description.split(/\.\s+/)[0].trim();
        if (first.length < 90) pool.push(`📖 ${first}.`);
      }
      const t = [];
      if (breed.affection_level >= 4) t.push('甘えん坊');
      if (breed.intelligence >= 4) t.push('かしこい');
      if (breed.energy_level >= 4) t.push('活発');
      if (breed.child_friendly >= 4) t.push('子供にやさしい');
      if (breed.shedding_level <= 2) t.push('抜け毛少なめ');
      if (t.length) pool.push(`✨ ${t.slice(0, 3).join(' · ')}なニャンコだよ！`);
      if (breed.weight?.metric) pool.push(`⚖️ 体重は${breed.weight.metric}kg。抱っこしやすいサイズかも！`);
    }
    return pool.sort(() => Math.random() - 0.5).slice(0, 4);
  }

  function isFaved(id, t) { return S.favorites.some(f => f.id === id && f.type === t); }

  function toggleFav() {
    const { breed, type, image } = S;
    const idx = S.favorites.findIndex(f => f.id === breed.id && f.type === type);
    if (idx >= 0) S.favorites.splice(idx, 1);
    else S.favorites.push({ id: breed.id, name: breed.name, type, image, origin: breed.origin || '' });
    localStorage.setItem('fwmt', JSON.stringify(S.favorites));
    updateFavCount();
    const btn = document.getElementById('fav-btn');
    if (btn) btn.textContent = isFaved(breed.id, type) ? '❤️' : '🤍';
  }

  function updateFavCount() { document.getElementById('fav-count').textContent = S.favorites.length; }
  function openFav() { document.getElementById('overlay').classList.remove('hidden'); renderFavList(); }
  function closeFav() { document.getElementById('overlay').classList.add('hidden'); }
  function overlayClick(e) { if (e.target === document.getElementById('overlay')) closeFav(); }

  function removeFav(idx) {
    S.favorites.splice(idx, 1);
    localStorage.setItem('fwmt', JSON.stringify(S.favorites));
    updateFavCount(); renderFavList();
  }

  function renderFavList() {
    const el = document.getElementById('fav-list');
    if (!S.favorites.length) {
      el.innerHTML = `<div class="empty-fav">まだお気に入りはいないよ！<br>気になった子に ❤️ を押してね 🐾</div>`;
      return;
    }
    el.innerHTML = S.favorites.map((f, i) => `
      <div class="fav-item">
        ${f.image ? `<img class="fav-thumb" src="${f.image}" alt="${f.name}">` : `<div class="fav-thumb-ph">${f.type === 'dog' ? '🐶' : '🐱'}</div>`}
        <div>
          <div class="fav-name">${f.name}</div>
          <div class="fav-meta">${f.type === 'dog' ? '🐶 いぬ' : '🐱 ねこ'}${f.origin ? ' · ' + f.origin : ''}</div>
        </div>
        <button class="fav-rm" onclick="removeFav(${i})">✕</button>
      </div>`).join('');
  }

  function renderEmpty(msg, loading = false) {
    const em = loading ? `<span class="spin">${S.type === 'dog' ? '🐶' : '🐱'}</span>` : '🐾';
    document.getElementById('main').innerHTML =
      `<div class="empty-state"><span class="em">${em}</span><p>${msg}</p></div>`;
  }

  function render() {
    const { breed, type, image } = S;
    const starters = makeStarters(breed, type);
    const animal = type === 'dog' ? '🐶' : '🐱';
    const tags = [];
    if (breed.life_span) tags.push(breed.life_span);
    if (type === 'dog' && breed.breed_group) tags.push(breed.breed_group);

    document.getElementById('main').innerHTML = `
      <div class="card">
        <div class="photo-area">
          ${image ? `<img class="breed-img" src="${image}" alt="${breed.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : ''}
          <div class="img-placeholder" style="${image ? 'display:none' : ''}">${animal}</div>
          <div class="gradient-bottom"></div>
          <div class="corner tl">${animal}</div>

          ${tags.length ? `<div class="tags-overlay">${tags.map(t => `<span class="tag-pill">${t}</span>`).join('')}</div>` : ''}

          <div class="name-overlay">
            <div class="breed-name">${breed.name}</div>
            ${breed.origin ? `<div class="breed-sub">📍 ${breed.origin}</div>` : ''}
          </div>

          <button class="fav-btn" id="fav-btn" onclick="toggleFav()">${isFaved(breed.id, type) ? '❤️' : '🤍'}</button>
        </div>

        <div class="info">
          <div class="starters-label">💭 はなしのたね</div>
          <div class="starters">${starters.map(s => `<div class="starter">${s}</div>`).join('')}</div>
        </div>

        <div class="card-bottom">
          <button class="btn-random" onclick="randomBreed()">🎲 ランダムで探す</button>
        </div>
      </div>`;
  }

  init();
</script>
</body>
</html>
