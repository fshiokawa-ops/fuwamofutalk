<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ふわもふトーク 🐾</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0c0c0e;
      --surface: #18181c;
      --surface2: #222228;
      --border: rgba(255,255,255,0.07);
      --text: #f0f0f0;
      --muted: #666;
      --dog: #ff6b6b;
      --cat: #a78bfa;
      --dog-glow: rgba(255,107,107,0.22);
      --cat-glow: rgba(167,139,250,0.22);
    }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'ヒラギノ角ゴ ProN W3', Meiryo, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 44px 16px 64px;
    }

    /* ─── Header ─── */
    .header { text-align: center; margin-bottom: 36px; }

    .eyebrow {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .title {
      font-size: 2.6rem;
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1;
      background: linear-gradient(130deg, #ff6b6b 0%, #c850f7 55%, #7c6efa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ─── Toggle ─── */
    .toggle-wrap {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 4px;
      margin-bottom: 24px;
      gap: 4px;
    }

    .toggle-btn {
      padding: 9px 30px;
      border: none; border-radius: 50px;
      font-size: 0.9rem; cursor: pointer;
      font-family: inherit; font-weight: 700;
      transition: all 0.25s ease;
      background: transparent; color: var(--muted);
      letter-spacing: 0.02em;
    }

    .toggle-btn.active-dog {
      background: linear-gradient(135deg, #ff6b6b, #ff4545);
      color: #fff;
      box-shadow: 0 4px 18px var(--dog-glow);
    }

    .toggle-btn.active-cat {
      background: linear-gradient(135deg, #a78bfa, #7c6efa);
      color: #fff;
      box-shadow: 0 4px 18px var(--cat-glow);
    }

    /* ─── Search ─── */
    .search-wrap {
      position: relative;
      max-width: 500px; width: 100%;
      margin-bottom: 28px;
    }

    .search-input {
      width: 100%;
      padding: 16px 52px 16px 22px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      color: var(--text);
      font-size: 0.97rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      caret-color: var(--dog);
    }

    .search-input:focus {
      border-color: rgba(255,255,255,0.18);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.04);
    }

    .search-input::placeholder { color: var(--muted); }

    .search-icon {
      position: absolute; right: 18px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted); font-size: 1rem; pointer-events: none;
    }

    /* ─── Dropdown ─── */
    .dropdown {
      position: absolute; top: calc(100% + 8px);
      left: 0; right: 0;
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      overflow: hidden;
      z-index: 50;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
      max-height: 292px; overflow-y: auto;
    }

    .dropdown::-webkit-scrollbar { width: 4px; }
    .dropdown::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .dd-item {
      padding: 13px 20px;
      cursor: pointer;
      transition: background 0.12s;
      font-size: 0.93rem;
      display: flex; align-items: center; gap: 12px;
      color: var(--muted);
    }

    .dd-item:hover, .dd-item.focused { background: var(--surface2); }
    .dd-item .hl { color: var(--text); font-weight: 800; }

    /* ─── Card ─── */
    .card {
      max-width: 500px; width: 100%;
      border-radius: 26px; overflow: hidden;
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: 0 28px 80px rgba(0,0,0,0.45);
      animation: fadeUp 0.38s cubic-bezier(.22,.68,0,1.2);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ─── Image ─── */
    .image-wrap {
      position: relative; width: 100%; height: 320px;
      background: var(--surface2); overflow: hidden;
    }

    .breed-img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.7s ease;
    }

    .card:hover .breed-img { transform: scale(1.04); }

    .img-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 6rem; background: var(--surface2);
    }

    .img-overlay {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 55%;
      background: linear-gradient(to top, var(--surface) 0%, transparent 100%);
    }

    /* ─── Fav button ─── */
    .fav-btn {
      position: absolute; top: 16px; right: 16px;
      width: 42px; height: 42px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(12,12,14,0.72);
      backdrop-filter: blur(10px);
      font-size: 1.15rem; cursor: pointer;
      transition: transform 0.18s, background 0.2s;
      display: flex; align-items: center; justify-content: center;
    }

    .fav-btn:hover { transform: scale(1.12); background: rgba(30,30,36,0.9); }
    .fav-btn:active { transform: scale(0.9); }

    /* ─── Info ─── */
    .info { padding: 22px 24px 18px; }

    .name-row {
      display: flex; align-items: baseline; gap: 12px; margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .breed-name {
      font-size: 1.85rem; font-weight: 900;
      color: var(--text); letter-spacing: -0.03em;
    }

    .breed-origin { font-size: 0.8rem; color: var(--muted); }

    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }

    .tag {
      padding: 4px 12px; border-radius: 20px;
      font-size: 0.74rem;
      background: var(--surface2); color: var(--muted);
      border: 1px solid var(--border);
    }

    /* ─── Starters ─── */
    .starters-label {
      font-size: 0.68rem; font-weight: 800; color: var(--muted);
      letter-spacing: 0.16em; text-transform: uppercase; margin-bottom: 12px;
    }

    .starters { display: flex; flex-direction: column; gap: 8px; }

    .starter {
      padding: 13px 16px; border-radius: 13px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-left: 2px solid;
      font-size: 0.88rem; line-height: 1.7; color: #b0b0b8;
      opacity: 0; transform: translateY(8px);
      animation: riseIn 0.38s ease forwards;
    }

    .starter:nth-child(1) { animation-delay: 0.06s; }
    .starter:nth-child(2) { animation-delay: 0.15s; }
    .starter:nth-child(3) { animation-delay: 0.24s; }
    .starter:nth-child(4) { animation-delay: 0.33s; }

    @keyframes riseIn { to { opacity: 1; transform: translateY(0); } }

    .type-dog .starter { border-left-color: var(--dog); }
    .type-cat .starter { border-left-color: var(--cat); }

    /* ─── Actions ─── */
    .actions { padding: 14px 24px 24px; display: flex; gap: 10px; }

    .btn-random {
      flex: 1; padding: 13px;
      border: 1px solid var(--border); border-radius: 14px;
      font-size: 0.88rem; font-weight: 700;
      cursor: pointer; font-family: inherit;
      background: var(--surface2); color: var(--muted);
      transition: all 0.2s; letter-spacing: 0.02em;
    }

    .btn-random:hover {
      border-color: rgba(255,255,255,0.2); color: var(--text);
      background: var(--surface);
    }

    /* ─── Empty state ─── */
    .empty-state {
      max-width: 500px; width: 100%;
      padding: 64px 24px; text-align: center;
      color: var(--muted);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 26px;
    }

    .empty-state .em { font-size: 3.2rem; margin-bottom: 16px; display: block; }

    .spin { animation: spin 1.1s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Fav counter ─── */
    .fav-counter {
      margin-top: 22px; font-size: 0.78rem; color: var(--muted);
      cursor: pointer; transition: color 0.2s; letter-spacing: 0.04em;
    }
    .fav-counter:hover { color: #aaa; }

    /* ─── Modal ─── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; padding: 24px;
    }

    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 24px; max-width: 480px; width: 100%;
      max-height: 82vh; overflow-y: auto; padding: 26px;
      box-shadow: 0 40px 100px rgba(0,0,0,0.7);
    }

    .modal-head {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 18px;
    }

    .modal-title { font-size: 1.25rem; font-weight: 900; color: var(--text); }

    .modal-close {
      border: 1px solid var(--border); background: var(--surface2);
      width: 34px; height: 34px; border-radius: 50%;
      cursor: pointer; font-size: 0.88rem; color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .modal-close:hover { background: var(--surface); color: var(--text); }

    .fav-item {
      display: flex; gap: 14px; align-items: center;
      padding: 12px 0; border-bottom: 1px solid var(--border);
    }

    .fav-thumb {
      width: 58px; height: 58px; border-radius: 13px;
      object-fit: cover; flex-shrink: 0; background: var(--surface2);
    }

    .fav-thumb-ph {
      width: 58px; height: 58px; border-radius: 13px;
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; flex-shrink: 0;
    }

    .fav-name { font-weight: 800; font-size: 0.93rem; color: var(--text); }
    .fav-meta { font-size: 0.74rem; color: var(--muted); margin-top: 3px; }

    .fav-rm {
      margin-left: auto; border: none; background: none;
      cursor: pointer; font-size: 0.95rem; color: var(--muted);
      transition: color 0.2s; flex-shrink: 0;
    }
    .fav-rm:hover { color: var(--dog); }

    .empty-fav {
      text-align: center; padding: 40px 0;
      color: var(--muted); font-size: 0.9rem; line-height: 1.9;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="header">
  <div class="eyebrow">🐾 Fuwamofutalk</div>
  <h1 class="title">犬猫ずかん</h1>
</div>

<div class="toggle-wrap">
  <button class="toggle-btn" id="btn-dog" onclick="setType('dog')">🐶 犬</button>
  <button class="toggle-btn" id="btn-cat" onclick="setType('cat')">🐱 猫</button>
</div>

<div class="search-wrap" id="search-wrap">
  <input
    class="search-input" id="search-input"
    type="text" autocomplete="off"
    placeholder="名前で検索… (例: Shiba, Siamese)"
    oninput="onInput()" onkeydown="onKeyDown(event)" onfocus="showDrop()"
  >
  <span class="search-icon">🔍</span>
  <div class="dropdown hidden" id="dropdown"></div>
</div>

<div id="main"></div>

<div class="fav-counter" onclick="openFav()">♡ お気に入り <span id="fav-count">0</span> 頭</div>

<div class="overlay hidden" id="overlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title">💕 お気に入り</span>
      <button class="modal-close" onclick="closeFav()">✕</button>
    </div>
    <div id="fav-list"></div>
  </div>
</div>

<script>
  const S = {
    type: 'dog',
    dogBreeds: [], catBreeds: [],
    breed: null, image: null,
    favorites: JSON.parse(localStorage.getItem('fwmt') || '[]'),
    focusIdx: -1,
  };

  async function init() {
    updateToggle();
    renderEmpty('読み込み中…', true);
    const [dogs, cats] = await Promise.all([
      fetch('https://api.thedogapi.com/v1/breeds').then(r => r.json()).catch(() => []),
      fetch('https://api.thecatapi.com/v1/breeds').then(r => r.json()).catch(() => []),
    ]);
    S.dogBreeds = Array.isArray(dogs) ? dogs : [];
    S.catBreeds = Array.isArray(cats) ? cats : [];
    updateFavCount();
    renderEmpty('名前を入力して検索してね 🐾');
  }

  function setType(t) {
    S.type = t; S.breed = null; S.image = null;
    updateToggle(); clearSearch();
    renderEmpty('名前を入力して検索してね 🐾');
  }

  function updateToggle() {
    document.getElementById('btn-dog').className = 'toggle-btn' + (S.type === 'dog' ? ' active-dog' : '');
    document.getElementById('btn-cat').className = 'toggle-btn' + (S.type === 'cat' ? ' active-cat' : '');
  }

  function breeds() { return S.type === 'dog' ? S.dogBreeds : S.catBreeds; }

  function onInput() {
    S.focusIdx = -1;
    const q = document.getElementById('search-input').value.trim().toLowerCase();
    if (!q) { hideDrop(); return; }
    const matches = breeds().filter(b => b.name.toLowerCase().includes(q)).slice(0, 10);
    renderDrop(matches, q);
  }

  function renderDrop(list, q) {
    const dd = document.getElementById('dropdown');
    if (!list.length) { hideDrop(); return; }
    const icon = S.type === 'dog' ? '🐶' : '🐱';
    dd.innerHTML = list.map(b => {
      const n = b.name;
      const i = n.toLowerCase().indexOf(q);
      const html = n.slice(0, i) + `<span class="hl">${n.slice(i, i + q.length)}</span>` + n.slice(i + q.length);
      return `<div class="dd-item" onclick="selectBreed(${breeds().indexOf(b)})">${icon} ${html}</div>`;
    }).join('');
    dd.classList.remove('hidden');
  }

  function showDrop() { if (document.getElementById('search-input').value.trim()) onInput(); }
  function hideDrop() { document.getElementById('dropdown').classList.add('hidden'); S.focusIdx = -1; }

  function onKeyDown(e) {
    const items = document.querySelectorAll('.dd-item');
    if (e.key === 'ArrowDown') { e.preventDefault(); S.focusIdx = Math.min(S.focusIdx + 1, items.length - 1); updFocus(items); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); S.focusIdx = Math.max(S.focusIdx - 1, -1); updFocus(items); }
    else if (e.key === 'Enter' && S.focusIdx >= 0) items[S.focusIdx]?.click();
    else if (e.key === 'Escape') hideDrop();
  }

  function updFocus(items) { items.forEach((el, i) => el.classList.toggle('focused', i === S.focusIdx)); }
  function clearSearch() { document.getElementById('search-input').value = ''; hideDrop(); }

  document.addEventListener('click', e => {
    if (!document.getElementById('search-wrap').contains(e.target)) hideDrop();
  });

  async function selectBreed(idx) {
    const breed = breeds()[idx];
    if (!breed) return;
    S.breed = breed;
    hideDrop();
    document.getElementById('search-input').value = breed.name;
    renderEmpty('読み込み中…', true);

    const base = S.type === 'dog'
      ? 'https://api.thedogapi.com/v1/images/search'
      : 'https://api.thecatapi.com/v1/images/search';

    try {
      const res = await fetch(`${base}?breed_ids=${breed.id}&limit=8`);
      const data = await res.json();
      const imgs = data.filter(d => d.url);
      S.image = imgs.length ? imgs[Math.floor(Math.random() * imgs.length)].url : null;
    } catch { S.image = null; }

    render();
  }

  async function randomBreed() {
    const list = breeds();
    if (!list.length) return;
    clearSearch();
    await selectBreed(Math.floor(Math.random() * list.length));
  }

  function makeStarters(breed, type) {
    const pool = [], name = breed.name;
    if (breed.temperament) {
      const pick = breed.temperament.split(',').map(s => s.trim()).filter(Boolean)
        .sort(() => Math.random() - 0.5).slice(0, 3);
      pool.push(`💬 「${pick.join('・')}」な${type === 'dog' ? 'ワンちゃん' : 'ニャンコ'}らしいよ。あなたのイメージと合ってる？`);
    }
    if (breed.origin) pool.push(`🌍 ${name}って${breed.origin}出身なんだって！意外じゃない？`);
    if (breed.life_span) pool.push(`⏳ 平均寿命は${breed.life_span}。長い縁になりそうだよね！`);
    if (type === 'dog') {
      if (breed.bred_for) pool.push(`🎯 もともと「${breed.bred_for}」のために育てられたって知ってた？`);
      if (breed.breed_group) pool.push(`📋 ${breed.breed_group}グループのワンちゃん。犬の世界にも派閥があるんだよ！`);
      if (breed.weight?.metric) pool.push(`⚖️ 大人になると体重${breed.weight.metric}kgになるんだって。抱っこできるかな？`);
    }
    if (type === 'cat') {
      if (breed.description) {
        const first = breed.description.split(/\.\s+/)[0].trim();
        if (first.length < 90) pool.push(`📖 ${first}.`);
      }
      const t = [];
      if (breed.affection_level >= 4) t.push('甘えん坊');
      if (breed.intelligence >= 4) t.push('かしこい');
      if (breed.energy_level >= 4) t.push('活発');
      if (breed.child_friendly >= 4) t.push('子供にもやさしい');
      if (breed.dog_friendly >= 4) t.push('犬とも仲良し');
      if (breed.vocalisation >= 4) t.push('おしゃべり上手');
      if (breed.shedding_level <= 2) t.push('抜け毛少なめ');
      if (t.length) pool.push(`⭐ ${t.slice(0, 3).join('・')}なニャンコ！`);
      if (breed.weight?.metric) pool.push(`⚖️ 体重は${breed.weight.metric}kg。ちょうど抱っこしやすいサイズかも！`);
    }
    return pool.sort(() => Math.random() - 0.5).slice(0, 4);
  }

  function isFaved(id, t) { return S.favorites.some(f => f.id === id && f.type === t); }

  function toggleFav() {
    const { breed, type, image } = S;
    const idx = S.favorites.findIndex(f => f.id === breed.id && f.type === type);
    if (idx >= 0) S.favorites.splice(idx, 1);
    else S.favorites.push({ id: breed.id, name: breed.name, type, image, origin: breed.origin || '' });
    localStorage.setItem('fwmt', JSON.stringify(S.favorites));
    updateFavCount();
    const btn = document.getElementById('fav-btn');
    if (btn) btn.textContent = isFaved(breed.id, type) ? '❤️' : '🤍';
  }

  function updateFavCount() { document.getElementById('fav-count').textContent = S.favorites.length; }
  function openFav() { document.getElementById('overlay').classList.remove('hidden'); renderFavList(); }
  function closeFav() { document.getElementById('overlay').classList.add('hidden'); }
  function overlayClick(e) { if (e.target === document.getElementById('overlay')) closeFav(); }

  function removeFav(idx) {
    S.favorites.splice(idx, 1);
    localStorage.setItem('fwmt', JSON.stringify(S.favorites));
    updateFavCount(); renderFavList();
  }

  function renderFavList() {
    const el = document.getElementById('fav-list');
    if (!S.favorites.length) {
      el.innerHTML = `<div class="empty-fav">まだお気に入りはいないよ！<br>気になった子に ❤️ を押してね</div>`;
      return;
    }
    el.innerHTML = S.favorites.map((f, i) => `
      <div class="fav-item">
        ${f.image ? `<img class="fav-thumb" src="${f.image}" alt="${f.name}">` : `<div class="fav-thumb-ph">${f.type === 'dog' ? '🐶' : '🐱'}</div>`}
        <div>
          <div class="fav-name">${f.name}</div>
          <div class="fav-meta">${f.type === 'dog' ? '犬' : '猫'}${f.origin ? ' · ' + f.origin : ''}</div>
        </div>
        <button class="fav-rm" onclick="removeFav(${i})">✕</button>
      </div>`).join('');
  }

  function renderEmpty(msg, loading = false) {
    const em = loading ? `<span class="spin">${S.type === 'dog' ? '🐶' : '🐱'}</span>` : '🐾';
    document.getElementById('main').innerHTML =
      `<div class="empty-state"><span class="em">${em}</span><p>${msg}</p></div>`;
  }

  function render() {
    const { breed, type, image } = S;
    const starters = makeStarters(breed, type);
    const animal = type === 'dog' ? '🐶' : '🐱';
    const tags = [];
    if (breed.life_span) tags.push(`⏳ ${breed.life_span}`);
    if (breed.weight?.metric) tags.push(`⚖️ ${breed.weight.metric}kg`);
    if (type === 'dog' && breed.breed_group) tags.push(`📋 ${breed.breed_group}`);
    if (type === 'cat' && breed.indoor === 1) tags.push('🏠 室内向き');

    document.getElementById('main').innerHTML = `
      <div class="card type-${type}">
        <div class="image-wrap">
          ${image ? `<img class="breed-img" src="${image}" alt="${breed.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : ''}
          <div class="img-placeholder" style="${image ? 'display:none' : ''}">${animal}</div>
          <div class="img-overlay"></div>
          <button class="fav-btn" id="fav-btn" onclick="toggleFav()">${isFaved(breed.id, type) ? '❤️' : '🤍'}</button>
        </div>
        <div class="info">
          <div class="name-row">
            <span class="breed-name">${breed.name}</span>
            ${breed.origin ? `<span class="breed-origin">📍 ${breed.origin}</span>` : ''}
          </div>
          ${tags.length ? `<div class="tags">${tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>` : ''}
          <div class="starters-label">💭 会話のきっかけ</div>
          <div class="starters">${starters.map(s => `<div class="starter">${s}</div>`).join('')}</div>
        </div>
        <div class="actions">
          <button class="btn-random" onclick="randomBreed()">🎲 ランダムで探す</button>
        </div>
      </div>`;
  }

  init();
</script>
</body>
</html>
