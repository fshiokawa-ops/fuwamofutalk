<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ふわもふトーク 🐾</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --pink: #F0287A;
      --pink2: #FF6DB2;
      --pale: #FFF0F6;
      --bg: #FDF5F8;
      --text: #2A1020;
      --muted: #C4A0B4;
      --border: rgba(240,40,122,0.15);
    }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'ヒラギノ角ゴ ProN W3', Meiryo, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 36px 16px 56px;
    }

    /* ─── Header ─── */
    .header { text-align: center; margin-bottom: 26px; }

    .logo-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .title {
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic;
      font-size: 2.4rem;
      font-weight: 700;
      color: var(--pink);
      letter-spacing: -0.01em;
      line-height: 1;
    }

    /* ─── Toggle ─── */
    .toggle-wrap {
      display: flex;
      background: white;
      border: 1.5px solid var(--border);
      border-radius: 50px;
      padding: 4px;
      margin-bottom: 22px;
      gap: 4px;
      box-shadow: 0 2px 12px rgba(240,40,122,0.08);
    }

    .toggle-btn {
      padding: 8px 28px;
      border: none; border-radius: 50px;
      font-size: 0.88rem; cursor: pointer;
      font-family: inherit; font-weight: 700;
      transition: all 0.25s ease;
      background: transparent;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .toggle-btn.active {
      background: linear-gradient(135deg, var(--pink), var(--pink2));
      color: white;
      box-shadow: 0 4px 14px rgba(240,40,122,0.3);
    }

    /* ─── Search ─── */
    .search-wrap {
      position: relative;
      max-width: 440px; width: 100%;
      margin-bottom: 24px;
    }

    .search-input {
      width: 100%;
      padding: 14px 48px 14px 20px;
      background: white;
      border: 1.5px solid var(--border);
      border-radius: 50px;
      color: var(--text);
      font-size: 0.92rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-shadow: 0 2px 12px rgba(240,40,122,0.07);
    }

    .search-input:focus {
      border-color: var(--pink2);
      box-shadow: 0 0 0 3px rgba(240,40,122,0.08);
    }

    .search-input::placeholder { color: var(--muted); }

    .search-icon {
      position: absolute; right: 18px; top: 50%;
      transform: translateY(-50%);
      color: var(--pink2); font-size: 0.95rem; pointer-events: none;
    }

    /* ─── Dropdown ─── */
    .dropdown {
      position: absolute; top: calc(100% + 8px);
      left: 0; right: 0;
      background: white;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      overflow: hidden; z-index: 50;
      box-shadow: 0 16px 48px rgba(240,40,122,0.15);
      max-height: 280px; overflow-y: auto;
    }

    .dropdown::-webkit-scrollbar { width: 4px; }
    .dropdown::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .dd-item {
      padding: 12px 20px;
      cursor: pointer;
      transition: background 0.12s;
      font-size: 0.9rem;
      display: flex; align-items: center; gap: 10px;
      color: var(--muted);
      border-bottom: 1px solid rgba(240,40,122,0.05);
    }

    .dd-item:hover, .dd-item.focused { background: var(--pale); }
    .dd-item .hl { color: var(--pink); font-weight: 800; }

    /* ─── Card ─── */
    .card {
      max-width: 440px; width: 100%;
      border-radius: 28px; overflow: hidden;
      background: white;
      box-shadow: 0 20px 64px rgba(240,40,122,0.15);
      animation: fadeUp 0.4s cubic-bezier(.22,.68,0,1.15);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ─── Photo area (full bleed) ─── */
    .photo-area {
      position: relative;
      width: 100%;
      height: 480px;
      overflow: hidden;
      background: #f8e8f0;
    }

    .breed-img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.8s ease;
    }

    .card:hover .breed-img { transform: scale(1.04); }

    .img-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 7rem;
      background: linear-gradient(160deg, #fce8f3, #f8d0e8);
    }

    /* Gradient overlays */
    .gradient-top {
      position: absolute; top: 0; left: 0; right: 0;
      height: 45%;
      background: linear-gradient(to bottom, rgba(0,0,0,0.25) 0%, transparent 100%);
      pointer-events: none;
    }

    .gradient-bottom {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 55%;
      background: linear-gradient(to top, rgba(20,5,15,0.82) 0%, transparent 100%);
      pointer-events: none;
    }

    /* Decorative frame */
    .frame {
      position: absolute;
      top: 18px; left: 18px; right: 18px;
      height: 54%;
      border: 1.5px solid rgba(255,255,255,0.45);
      border-radius: 2px;
      pointer-events: none;
    }

    /* Breed name — upper overlay */
    .name-overlay {
      position: absolute;
      top: 28px; left: 28px;
      z-index: 2;
    }

    .name-overlay .breed-name {
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic;
      font-size: 2.6rem;
      font-weight: 700;
      color: var(--pink);
      line-height: 1.1;
      text-shadow: 0 1px 12px rgba(0,0,0,0.2);
    }

    .name-overlay .breed-origin-tag {
      display: inline-block;
      margin-top: 6px;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.75);
      letter-spacing: 0.08em;
    }

    /* Starters — lower overlay */
    .starters-overlay {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 20px 26px 24px;
      z-index: 2;
    }

    .starter-item {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.88);
      line-height: 1.5;
      padding: 3px 0;
      letter-spacing: 0.01em;
      opacity: 0;
      transform: translateX(-6px);
      animation: slideIn 0.35s ease forwards;
    }

    .starter-item:nth-child(1) { animation-delay: 0.08s; }
    .starter-item:nth-child(2) { animation-delay: 0.18s; }
    .starter-item:nth-child(3) { animation-delay: 0.28s; }
    .starter-item:nth-child(4) { animation-delay: 0.38s; }

    @keyframes slideIn { to { opacity: 1; transform: translateX(0); } }

    /* Tags row */
    .tags-overlay {
      position: absolute;
      top: 18px; right: 18px;
      z-index: 2;
      display: flex; flex-direction: column; gap: 5px; align-items: flex-end;
    }

    .tag-pill {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.68rem;
      font-weight: 700;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(6px);
      color: rgba(255,255,255,0.85);
      border: 1px solid rgba(255,255,255,0.3);
      letter-spacing: 0.04em;
    }

    /* Fav button */
    .fav-btn {
      position: absolute;
      bottom: 20px; right: 20px;
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.3);
      background: rgba(240,40,122,0.75);
      backdrop-filter: blur(8px);
      font-size: 1.1rem;
      cursor: pointer;
      transition: transform 0.18s, background 0.2s;
      display: flex; align-items: center; justify-content: center;
      z-index: 3;
    }

    .fav-btn:hover { transform: scale(1.12); background: var(--pink); }
    .fav-btn:active { transform: scale(0.9); }

    /* ─── Bottom bar ─── */
    .card-bottom {
      padding: 16px 20px;
      display: flex;
      gap: 10px;
      align-items: center;
      background: white;
    }

    .btn-random {
      flex: 1; padding: 13px;
      border: 1.5px solid var(--border);
      border-radius: 50px;
      font-size: 0.88rem; font-weight: 700;
      cursor: pointer; font-family: inherit;
      background: white; color: var(--muted);
      transition: all 0.2s;
      letter-spacing: 0.04em;
    }

    .btn-random:hover {
      border-color: var(--pink2);
      color: var(--pink);
      background: var(--pale);
    }

    /* ─── Empty state ─── */
    .empty-state {
      max-width: 440px; width: 100%;
      padding: 70px 24px; text-align: center;
      color: var(--muted);
      background: white;
      border: 1.5px solid var(--border);
      border-radius: 28px;
      box-shadow: 0 8px 32px rgba(240,40,122,0.07);
    }

    .empty-state .em { font-size: 3.5rem; margin-bottom: 14px; display: block; }
    .empty-state p { font-size: 0.9rem; line-height: 1.8; }

    .spin { animation: spin 1.1s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Fav counter ─── */
    .fav-counter {
      margin-top: 20px; font-size: 0.78rem; color: var(--muted);
      cursor: pointer; transition: color 0.2s;
      letter-spacing: 0.06em;
    }
    .fav-counter:hover { color: var(--pink); }

    /* ─── Modal ─── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(40,10,25,0.55);
      backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; padding: 24px;
    }

    .modal {
      background: white;
      border: 1.5px solid var(--border);
      border-radius: 26px; max-width: 440px; width: 100%;
      max-height: 82vh; overflow-y: auto; padding: 26px;
      box-shadow: 0 32px 80px rgba(240,40,122,0.18);
    }

    .modal-head {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 18px;
    }

    .modal-title { font-size: 1.2rem; font-weight: 900; color: var(--text); }

    .modal-close {
      border: 1.5px solid var(--border); background: var(--pale);
      width: 34px; height: 34px; border-radius: 50%;
      cursor: pointer; font-size: 0.85rem; color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .modal-close:hover { background: var(--border); color: var(--pink); }

    .fav-item {
      display: flex; gap: 14px; align-items: center;
      padding: 12px 0; border-bottom: 1px solid var(--pale);
    }

    .fav-thumb {
      width: 58px; height: 58px; border-radius: 14px;
      object-fit: cover; flex-shrink: 0; background: var(--pale);
    }

    .fav-thumb-ph {
      width: 58px; height: 58px; border-radius: 14px;
      background: var(--pale);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; flex-shrink: 0;
    }

    .fav-name { font-weight: 800; font-size: 0.93rem; color: var(--text); }
    .fav-meta { font-size: 0.74rem; color: var(--muted); margin-top: 2px; }

    .fav-rm {
      margin-left: auto; border: none; background: none;
      cursor: pointer; font-size: 0.9rem; color: var(--muted);
      transition: color 0.2s; flex-shrink: 0;
    }
    .fav-rm:hover { color: var(--pink); }

    .empty-fav {
      text-align: center; padding: 40px 0;
      color: var(--muted); font-size: 0.9rem; line-height: 1.9;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="header">
  <div class="logo-label">🐾 Fuwamofutalk</div>
  <h1 class="title">犬猫ずかん</h1>
</div>

<div class="toggle-wrap">
  <button class="toggle-btn" id="btn-dog" onclick="setType('dog')">🐶 Dog</button>
  <button class="toggle-btn" id="btn-cat" onclick="setType('cat')">🐱 Cat</button>
</div>

<div class="search-wrap" id="search-wrap">
  <input
    class="search-input" id="search-input"
    type="text" autocomplete="off"
    placeholder="名前で検索… (例: Shiba, Siamese)"
    oninput="onInput()" onkeydown="onKeyDown(event)" onfocus="showDrop()"
  >
  <span class="search-icon">🔍</span>
  <div class="dropdown hidden" id="dropdown"></div>
</div>

<div id="main"></div>

<div class="fav-counter" onclick="openFav()">♡ お気に入り <span id="fav-count">0</span> 頭</div>

<div class="overlay hidden" id="overlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title">💕 お気に入り</span>
      <button class="modal-close" onclick="closeFav()">✕</button>
    </div>
    <div id="fav-list"></div>
  </div>
</div>

<script>
  const S = {
    type: 'dog',
    dogBreeds: [], catBreeds: [],
    breed: null, image: null,
    favorites: JSON.parse(localStorage.getItem('fwmt') || '[]'),
    focusIdx: -1,
  };

  async function init() {
    updateToggle();
    renderEmpty('読み込み中…', true);
    const [dogs, cats] = await Promise.all([
      fetch('https://api.thedogapi.com/v1/breeds').then(r => r.json()).catch(() => []),
      fetch('https://api.thecatapi.com/v1/breeds').then(r => r.json()).catch(() => []),
    ]);
    S.dogBreeds = Array.isArray(dogs) ? dogs : [];
    S.catBreeds = Array.isArray(cats) ? cats : [];
    updateFavCount();
    renderEmpty('名前を入力して検索してね 🐾');
  }

  function setType(t) {
    S.type = t; S.breed = null; S.image = null;
    updateToggle(); clearSearch();
    renderEmpty('名前を入力して検索してね 🐾');
  }

  function updateToggle() {
    document.getElementById('btn-dog').className = 'toggle-btn' + (S.type === 'dog' ? ' active' : '');
    document.getElementById('btn-cat').className = 'toggle-btn' + (S.type === 'cat' ? ' active' : '');
  }

  function breeds() { return S.type === 'dog' ? S.dogBreeds : S.catBreeds; }

  function onInput() {
    S.focusIdx = -1;
    const q = document.getElementById('search-input').value.trim().toLowerCase();
    if (!q) { hideDrop(); return; }
    const matches = breeds().filter(b => b.name.toLowerCase().includes(q)).slice(0, 10);
    renderDrop(matches, q);
  }

  function renderDrop(list, q) {
    const dd = document.getElementById('dropdown');
    if (!list.length) { hideDrop(); return; }
    const icon = S.type === 'dog' ? '🐶' : '🐱';
    dd.innerHTML = list.map(b => {
      const n = b.name;
      const i = n.toLowerCase().indexOf(q);
      const html = n.slice(0, i) + `<span class="hl">${n.slice(i, i + q.length)}</span>` + n.slice(i + q.length);
      return `<div class="dd-item" onclick="selectBreed(${breeds().indexOf(b)})">${icon} ${html}</div>`;
    }).join('');
    dd.classList.remove('hidden');
  }

  function showDrop() { if (document.getElementById('search-input').value.trim()) onInput(); }
  function hideDrop() { document.getElementById('dropdown').classList.add('hidden'); S.focusIdx = -1; }

  function onKeyDown(e) {
    const items = document.querySelectorAll('.dd-item');
    if (e.key === 'ArrowDown') { e.preventDefault(); S.focusIdx = Math.min(S.focusIdx + 1, items.length - 1); updFocus(items); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); S.focusIdx = Math.max(S.focusIdx - 1, -1); updFocus(items); }
    else if (e.key === 'Enter' && S.focusIdx >= 0) items[S.focusIdx]?.click();
    else if (e.key === 'Escape') hideDrop();
  }

  function updFocus(items) { items.forEach((el, i) => el.classList.toggle('focused', i === S.focusIdx)); }
  function clearSearch() { document.getElementById('search-input').value = ''; hideDrop(); }

  document.addEventListener('click', e => {
    if (!document.getElementById('search-wrap').contains(e.target)) hideDrop();
  });

  async function selectBreed(idx) {
    const breed = breeds()[idx];
    if (!breed) return;
    S.breed = breed;
    hideDrop();
    document.getElementById('search-input').value = breed.name;
    renderEmpty('読み込み中…', true);

    const base = S.type === 'dog'
      ? 'https://api.thedogapi.com/v1/images/search'
      : 'https://api.thecatapi.com/v1/images/search';

    try {
      const res = await fetch(`${base}?breed_ids=${breed.id}&limit=8`);
      const data = await res.json();
      const imgs = data.filter(d => d.url);
      S.image = imgs.length ? imgs[Math.floor(Math.random() * imgs.length)].url : null;
    } catch { S.image = null; }

    render();
  }

  async function randomBreed() {
    const list = breeds();
    if (!list.length) return;
    clearSearch();
    await selectBreed(Math.floor(Math.random() * list.length));
  }

  function makeStarters(breed, type) {
    const pool = [], name = breed.name;
    if (breed.temperament) {
      const pick = breed.temperament.split(',').map(s => s.trim()).filter(Boolean)
        .sort(() => Math.random() - 0.5).slice(0, 3);
      pool.push(`${pick.join(' · ')}`);
    }
    if (breed.origin) pool.push(`📍 ${breed.origin}出身`);
    if (breed.life_span) pool.push(`⏳ 寿命 ${breed.life_span}`);
    if (type === 'dog') {
      if (breed.bred_for) pool.push(`🎯 ${breed.bred_for}`);
      if (breed.breed_group) pool.push(`🏷 ${breed.breed_group} Group`);
      if (breed.weight?.metric) pool.push(`⚖️ ${breed.weight.metric} kg`);
    }
    if (type === 'cat') {
      if (breed.description) {
        const first = breed.description.split(/\.\s+/)[0].trim();
        if (first.length < 80) pool.push(`📖 ${first}`);
      }
      const t = [];
      if (breed.affection_level >= 4) t.push('甘えん坊');
      if (breed.intelligence >= 4) t.push('かしこい');
      if (breed.energy_level >= 4) t.push('活発');
      if (breed.child_friendly >= 4) t.push('子供にやさしい');
      if (breed.shedding_level <= 2) t.push('抜け毛少なめ');
      if (t.length) pool.push(`✨ ${t.slice(0, 3).join(' · ')}`);
      if (breed.weight?.metric) pool.push(`⚖️ ${breed.weight.metric} kg`);
    }
    return pool.sort(() => Math.random() - 0.5).slice(0, 4);
  }

  function isFaved(id, t) { return S.favorites.some(f => f.id === id && f.type === t); }

  function toggleFav() {
    const { breed, type, image } = S;
    const idx = S.favorites.findIndex(f => f.id === breed.id && f.type === type);
    if (idx >= 0) S.favorites.splice(idx, 1);
    else S.favorites.push({ id: breed.id, name: breed.name, type, image, origin: breed.origin || '' });
    localStorage.setItem('fwmt', JSON.stringify(S.favorites));
    updateFavCount();
    const btn = document.getElementById('fav-btn');
    if (btn) btn.textContent = isFaved(breed.id, type) ? '❤️' : '🤍';
  }

  function updateFavCount() { document.getElementById('fav-count').textContent = S.favorites.length; }
  function openFav() { document.getElementById('overlay').classList.remove('hidden'); renderFavList(); }
  function closeFav() { document.getElementById('overlay').classList.add('hidden'); }
  function overlayClick(e) { if (e.target === document.getElementById('overlay')) closeFav(); }

  function removeFav(idx) {
    S.favorites.splice(idx, 1);
    localStorage.setItem('fwmt', JSON.stringify(S.favorites));
    updateFavCount(); renderFavList();
  }

  function renderFavList() {
    const el = document.getElementById('fav-list');
    if (!S.favorites.length) {
      el.innerHTML = `<div class="empty-fav">まだお気に入りはいないよ！<br>気になった子に ❤️ を押してね</div>`;
      return;
    }
    el.innerHTML = S.favorites.map((f, i) => `
      <div class="fav-item">
        ${f.image ? `<img class="fav-thumb" src="${f.image}" alt="${f.name}">` : `<div class="fav-thumb-ph">${f.type === 'dog' ? '🐶' : '🐱'}</div>`}
        <div>
          <div class="fav-name">${f.name}</div>
          <div class="fav-meta">${f.type === 'dog' ? '犬' : '猫'}${f.origin ? ' · ' + f.origin : ''}</div>
        </div>
        <button class="fav-rm" onclick="removeFav(${i})">✕</button>
      </div>`).join('');
  }

  function renderEmpty(msg, loading = false) {
    const em = loading ? `<span class="spin">${S.type === 'dog' ? '🐶' : '🐱'}</span>` : '🐾';
    document.getElementById('main').innerHTML =
      `<div class="empty-state"><span class="em">${em}</span><p>${msg}</p></div>`;
  }

  function render() {
    const { breed, type, image } = S;
    const starters = makeStarters(breed, type);
    const animal = type === 'dog' ? '🐶' : '🐱';
    const tags = [];
    if (breed.life_span) tags.push(breed.life_span);
    if (type === 'dog' && breed.breed_group) tags.push(breed.breed_group);
    if (type === 'cat' && breed.indoor === 1) tags.push('室内向き');

    document.getElementById('main').innerHTML = `
      <div class="card">
        <div class="photo-area">
          ${image ? `<img class="breed-img" src="${image}" alt="${breed.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : ''}
          <div class="img-placeholder" style="${image ? 'display:none' : ''}">${animal}</div>

          <div class="gradient-top"></div>
          <div class="gradient-bottom"></div>
          <div class="frame"></div>

          <!-- Breed name overlay (upper left) -->
          <div class="name-overlay">
            <div class="breed-name">${breed.name}</div>
            ${breed.origin ? `<div class="breed-origin-tag">📍 ${breed.origin}</div>` : ''}
          </div>

          <!-- Tags (upper right) -->
          ${tags.length ? `<div class="tags-overlay">${tags.map(t => `<span class="tag-pill">${t}</span>`).join('')}</div>` : ''}

          <!-- Starters overlay (lower) -->
          <div class="starters-overlay">
            ${starters.map(s => `<div class="starter-item">${s}</div>`).join('')}
          </div>

          <!-- Fav button -->
          <button class="fav-btn" id="fav-btn" onclick="toggleFav()">${isFaved(breed.id, type) ? '❤️' : '🤍'}</button>
        </div>

        <div class="card-bottom">
          <button class="btn-random" onclick="randomBreed()">🎲 ランダムで探す</button>
        </div>
      </div>`;
  }

  init();
</script>
</body>
</html>
